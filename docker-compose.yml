services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  tiger-mcp:
    build: .
    ports:
      - "${MCP_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./secrets/private.pem:/secrets/private.pem:ro
      - tiger-state:/data/state
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - TIGER_PRIVATE_KEY_PATH=/secrets/private.pem
      - TIGER_STATE_DIR=/data/state
      - MCP_TRANSPORT=streamable-http
      - REDIS_URL=redis://redis:6379/0
      - TIGER_EVENTS_ENABLED=true

volumes:
  tiger-state:
  redis-data:
